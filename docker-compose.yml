services:
  postgres:
    image: postgres:16-alpine
    container_name: transcription-postgres
    environment:
      POSTGRES_DB: transcription_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: transcription-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: transcription-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcription-backend
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HF_HUB_LOCAL_FILES_ONLY=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - upload_data:/tmp/uploads
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  celery-transcription:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcription-celery-transcription
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=transcription --concurrency=2 --pool=prefork --max-tasks-per-child=10 --max-memory-per-child=500000
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HF_HUB_LOCAL_FILES_ONLY=1
    depends_on:
      - backend
      - redis
      - minio
    volumes:
      - ./backend/app:/app/app
      - upload_data:/tmp/uploads
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  celery-segmentation:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcription-celery-segmentation
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=segmentation --concurrency=2 --pool=prefork
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HF_HUB_LOCAL_FILES_ONLY=1
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend/app:/app/app
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcription-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  upload_data:
